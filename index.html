<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Tables Project</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Student Data Table</h2>

  <!-- Responsive Wrapper -->
  <div class="table-responsive">

    <table class="table table-bordered table-striped table-hover table-sm">

      <!-- Table Header -->
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Department</th>
          <th>Marks</th>
          <th>Status</th>
        </tr>
      </thead>

      <!-- Table Body -->
      <tbody>
        <tr class="table-success">
          <td>1</td>
          <td>Arun</td>
          <td>CSE</td>
          <td>85</td>
          <td>Pass</td>
        </tr>

        <tr class="table-warning">
          <td>2</td>
          <td>Priya</td>
          <td>IT</td>
          <td>65</td>
          <td>Average</td>
        </tr>

        <tr class="table-danger">
          <td>3</td>
          <td>Karthik</td>
          <td>ECE</td>
          <td>40</td>
          <td>Fail</td>
        </tr>

        <tr class="table-info">
          <td>4</td>
          <td>Divya</td>
          <td>EEE</td>
          <td>75</td>
          <td>Good</td>
        </tr>

        <tr class="table-primary">
          <td>5</td>
          <td>Rahul</td>
          <td>MECH</td>
          <td>90</td>
          <td>Excellent</td>
        </tr>
      </tbody>

    </table>

  </div>

  <!-- Borderless Example -->
  <h4 class="mt-5">Borderless Table</h4>
  <table class="table table-borderless">
    <tr>
      <th>Name</th>
      <th>City</th>
    </tr>
    <tr>
      <td>John</td>
      <td>Chennai</td>
    </tr>
    <tr>
      <td>Ravi</td>
      <td>Coimbatore</td>
    </tr>
  </table>

</body>
</html>
